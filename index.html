  <style>

// ─── INDEXED DB (v3) ──────────────────────────────────────
// ═══════════════════════════════════════════════════════════
const DB_NAME = 'commonplace_db', DB_VER = 3;
function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('quotes')) { const s = db.createObjectStore('quotes', { keyPath: 'id' }); s.createIndex('sourceId', 'sourceId', { unique: false }); }
      if (!db.objectStoreNames.contains('sources')) { db.createObjectStore('sources', { keyPath: 'id' }); }
      if (!db.objectStoreNames.contains('connections')) { const c = db.createObjectStore('connections', { keyPath: 'id' }); c.createIndex('quoteA', 'quoteA', { unique: false }); c.createIndex('quoteB', 'quoteB', { unique: false }); }
      if (!db.objectStoreNames.contains('settings')) { db.createObjectStore('settings', { keyPath: 'key' }); }
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function dbAll(store) { const db = await openDB(); return new Promise((res, rej) => { const r = db.transaction(store, 'readonly').objectStore(store).getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function dbPut(store, item) { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(store, 'readwrite'); tx.objectStore(store).put(item); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
async function dbDel(store, id) { const db = await openDB(); return new Promise((res, rej) => { const tx = db.transaction(store, 'readwrite'); tx.objectStore(store).delete(id); tx.oncomplete = () => res(); tx.onerror = () => rej(tx.error); }); }
async function dbGet(store, key) { const db = await openDB(); return new Promise((res, rej) => { const r = db.transaction(store, 'readonly').objectStore(store).get(key); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 9); }

// ═══════════════════════════════════════════════════════════
// ─── FIREBASE / CLOUD SYNC LAYER ─────────────────────────
// ═══════════════════════════════════════════════════════════
let firebaseApp = null;
let firebaseAuth = null;
let firebaseDb = null;

function initFirebase(config) {
  try {
    if (firebaseApp) { firebaseApp.delete().catch(()=>{}); }
    firebaseApp = firebase.initializeApp(config);
    firebaseAuth = firebase.auth();
    firebaseDb = firebase.firestore();
    console.log('Firebase initialized');
    return true;
  } catch (err) {
    console.error('Firebase init error:', err);
    return false;
  }
}

// Firestore helpers — data stored under users/{uid}/{collection}/{docId}
function fsCol(uid, collection) { return firebaseDb.collection('users').doc(uid).collection(collection); }
async function fsAll(uid, collection) { const snap = await fsCol(uid, collection).get(); return snap.docs.map(d => ({ ...d.data(), id: d.id })); }
async function fsPut(uid, collection, item) {
  // Firestore rejects undefined values — strip them out
  const clean = JSON.parse(JSON.stringify(item));
  await fsCol(uid, collection).doc(item.id).set(clean);
}
async function fsDel(uid, collection, id) { await fsCol(uid, collection).doc(id).delete(); }

// Unified data layer — returns same interface whether local or cloud
function createDataLayer(uid) {
  if (uid && firebaseDb) {
    return {
      all: (col) => fsAll(uid, col),
      put: (col, item) => fsPut(uid, col, item),
      del: (col, id) => fsDel(uid, col, id),
      get: async (col, key) => { const doc = await fsCol(uid, col).doc(key).get(); return doc.exists ? { ...doc.data(), key } : undefined; },
      getSetting: async (key) => { const doc = await fsCol(uid, 'settings').doc(key).get(); return doc.exists ? doc.data() : undefined; },
      putSetting: (key, value) => fsCol(uid, 'settings').doc(key).set({ key, value }),
      isCloud: true,
    };
  }
  return {
    all: dbAll,
    put: dbPut,
    del: dbDel,
    get: dbGet,
    getSetting: (key) => dbGet('settings', key),
    putSetting: (key, value) => dbPut('settings', { key, value }),
    isCloud: false,
  };
}

// ─── AI SERVICE ───────────────────────────────────────────
// ═══════════════════════════════════════════════════════════
async function callClaude(apiKey, prompt, model = 'claude-haiku-4-5-20251001') {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({ model, max_tokens: 1024, messages: [{ role: 'user', content: prompt }] })
  });
  if (!resp.ok) { const err = await resp.text(); throw new Error(`API error ${resp.status}: ${err}`); }
  const data = await resp.json();
  return data.content[0].text;
}

function parseJSON(text) {
  try {
    const match = text.match(/\[[\s\S]*\]/);
    return match ? JSON.parse(match[0]) : [];
  } catch { return []; }
}

async function aiExtractThemes(apiKey, quoteText, source, author) {
  const prompt = `Analyze this quote and extract 2-5 underlying themes. Focus on deep philosophical, emotional, or intellectual themes rather than surface-level topics. Be concise — each theme should be 1-2 words.

Quote: "${quoteText}"
${source ? `Source: ${source}` : ''}${author ? ` by ${author}` : ''}

Return ONLY a JSON array of lowercase theme strings. Example: ["resilience", "mortality", "inner peace"]`;
  const result = await callClaude(apiKey, prompt);
  return parseJSON(result).filter(t => typeof t === 'string').map(t => t.toLowerCase().trim());
}

async function aiDiscoverConnections(apiKey, newQuote, existingQuotes) {
  if (existingQuotes.length === 0) return [];
  const candidates = existingQuotes.slice(0, 30);
  const quotesText = candidates.map(q => `[${q.id}] "${q.text.slice(0, 120)}" (${q.source || 'unknown source'})`).join('\n');

  const prompt = `Given this new quote, identify which existing quotes share a deep thematic connection. Look for shared underlying ideas, complementary perspectives, or meaningful contrasts — not just surface-level topic overlap. Be selective: only flag truly meaningful connections.

New quote: "${newQuote.text.slice(0, 200)}" (from ${newQuote.source || 'unknown'})

Existing quotes:
${quotesText}

Return ONLY a JSON array of objects: [{"id": "quote_id", "reason": "brief 5-10 word explanation"}]
Return an empty array [] if no deep connections exist. Maximum 4 connections.`;

  const result = await callClaude(apiKey, prompt);
  return parseJSON(result).filter(c => c.id && c.reason && candidates.some(q => q.id === c.id));
}

async function aiBatchAnalyze(apiKey, quotes, onProgress) {
  const results = { themes: {}, connections: [] };
  for (let i = 0; i < quotes.length; i++) {
    const q = quotes[i];
    try {
      if (!q.aiThemes || q.aiThemes.length === 0) {
        const themes = await aiExtractThemes(apiKey, q.text, q.source, q.author);
        results.themes[q.id] = themes;
      }
      if (i > 0) {
        const priors = quotes.slice(0, i);
        const connections = await aiDiscoverConnections(apiKey, q, priors);
        connections.forEach(c => {
          results.connections.push({ id: genId(), quoteA: q.id, quoteB: c.id, reason: c.reason, createdAt: new Date().toISOString() });
        });
      }
    } catch (err) { console.error('AI batch error for quote', q.id, err); }
    if (onProgress) onProgress(i + 1, quotes.length);
  }
  return results;
}

// ─── Small Components ───────────────────────────────────────
function Toast({ message, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, [onDone]);
  return <div className={`toast ${type === 'ai' ? 'ai-toast' : type === 'sync' ? 'sync-toast' : ''}`}>{message}</div>;
}

function ThemeInput({ themes, onChange, allThemes }) {
  const [input, setInput] = useState('');
  const inputRef = useRef(null);
  const suggestions = useMemo(() => {
    if (!input.trim()) return allThemes.filter(t => !themes.includes(t)).slice(0, 8);
    return allThemes.filter(t => t.toLowerCase().includes(input.toLowerCase()) && !themes.includes(t)).slice(0, 6);
  }, [input, allThemes, themes]);
  const addTheme = (t) => { const v = t.trim().toLowerCase(); if (v && !themes.includes(v)) onChange([...themes, v]); setInput(''); inputRef.current?.focus(); };
  const removeTheme = (t) => onChange(themes.filter(x => x !== t));
  return (
    <div>
      <div className="theme-input-container" onClick={() => inputRef.current?.focus()}>
        {themes.map(t => <span className="theme-chip" key={t}>{t}<button onClick={e => { e.stopPropagation(); removeTheme(t); }}>&times;</button></span>)}
        <input ref={inputRef} className="theme-input" value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addTheme(input); } else if (e.key === 'Backspace' && !input && themes.length) removeTheme(themes[themes.length - 1]); }}
          placeholder={themes.length ? '' : 'Type theme and press Enter...'} />
      </div>
      {suggestions.length > 0 && <div className="theme-suggestions">{suggestions.map(s => <button key={s} className="theme-suggestion" onClick={() => addTheme(s)}>{s}</button>)}</div>}
    </div>
  );
}

function SourceTypeBadge({ type }) {
  const cfg = SRC_CFG[type] || SRC_CFG.other;
  return <span className="source-type-badge" style={{ background: cfg.color + '22', color: cfg.color }}>{type}</span>;
}

// ═══════════════════════════════════════════════════════════
// ─── OBSIDIAN-STYLE KNOWLEDGE GRAPH ──────────────────────
// ═══════════════════════════════════════════════════════════
function KnowledgeGraph({ quotes, connections, onQuoteClick, onThemeClick, onSourceClick }) {
  const svgRef = useRef(null);
  const containerRef = useRef(null);
  const simRef = useRef(null);

  useEffect(() => {
    if (!svgRef.current || quotes.length === 0) return;
    const width = containerRef.current.clientWidth;
    const height = 420;

    const nodes = []; const nodeMap = {};
    const themeSet = new Set(); const sourceSet = new Set();

    quotes.forEach(q => {
      const n = { id: q.id, label: q.text.slice(0, 40) + (q.text.length > 40 ? '...' : ''), type: 'quote', data: q, count: 1 };
      nodes.push(n); nodeMap[q.id] = n;
      if (q.source) sourceSet.add(q.source);
      (q.themes || []).forEach(t => themeSet.add(t));
      (q.aiThemes || []).forEach(t => themeSet.add(t));
    });

    themeSet.forEach(t => { const n = { id: `t:${t}`, label: t, type: 'theme', count: 0 }; nodes.push(n); nodeMap[n.id] = n; });
    sourceSet.forEach(s => { const n = { id: `s:${s}`, label: s, type: 'source', count: 0 }; nodes.push(n); nodeMap[n.id] = n; });

    const links = [];
    quotes.forEach(q => {
      const allT = [...new Set([...(q.themes || []), ...(q.aiThemes || [])])];
      allT.forEach(t => {
        const thId = `t:${t}`;
        if (nodeMap[thId]) { nodeMap[thId].count++; links.push({ source: q.id, target: thId, type: 'theme' }); }
      });
      if (q.source && nodeMap[`s:${q.source}`]) {
        nodeMap[`s:${q.source}`].count++;
        links.push({ source: q.id, target: `s:${q.source}`, type: 'source' });
      }
    });

    connections.forEach(c => {
      if (nodeMap[c.quoteA] && nodeMap[c.quoteB]) {
        links.push({ source: c.quoteA, target: c.quoteB, type: 'connection', reason: c.reason });
      }
    });

    const svg = d3.select(svgRef.current); svg.selectAll('*').remove();
    svg.attr('width', width).attr('height', height);

    const defs = svg.append('defs');
    const glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'coloredBlur');
    const merge = glow.append('feMerge');
    merge.append('feMergeNode').attr('in', 'coloredBlur');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');

    const g = svg.append('g');
    svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', (e) => g.attr('transform', e.transform)));

    if (simRef.current) simRef.current.stop();
    const sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
        if (d.type === 'connection') return 60;
        if (d.type === 'source') return 70;
        return 55;
      }))
      .force('charge', d3.forceManyBody().strength(d => d.type === 'quote' ? -80 : -150))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(d => d.type === 'quote' ? 12 : 20));
    simRef.current = sim;

    const link = g.append('g').selectAll('line').data(links).join('line')
      .attr('stroke', d => d.type === 'connection' ? 'var(--graph-connection)' : d.type === 'source' ? 'rgba(122,176,212,0.15)' : 'rgba(212,165,116,0.15)')
      .attr('stroke-width', d => d.type === 'connection' ? 1.5 : 0.8)
      .attr('stroke-dasharray', d => d.type === 'connection' ? '4,3' : 'none')
      .attr('opacity', 0.6);

    const node = g.append('g').selectAll('g').data(nodes).join('g').style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

    node.append('circle')
      .attr('r', d => {
        if (d.type === 'quote') return 6;
        return Math.max(10, Math.min(d.count * 3 + 8, 22));
      })
      .attr('fill', d => {
        if (d.type === 'theme') return 'var(--graph-theme)';
        if (d.type === 'source') return 'var(--graph-source)';
        return 'var(--graph-quote)';
      })
      .attr('fill-opacity', d => d.type === 'quote' ? 0.5 : 0.2)
      .attr('stroke', d => {
        if (d.type === 'theme') return 'var(--graph-theme)';
        if (d.type === 'source') return 'var(--graph-source)';
        return 'var(--graph-quote)';
      })
      .attr('stroke-width', d => d.type === 'quote' ? 1 : 1.5);

    node.filter(d => d.type !== 'quote').append('text')
      .text(d => d.label.length > 16 ? d.label.slice(0, 14) + '...' : d.label)
      .attr('text-anchor', 'middle')
      .attr('dy', d => Math.max(10, Math.min(d.count * 3 + 8, 22)) + 13)
      .attr('fill', d => d.type === 'theme' ? 'var(--graph-theme)' : 'var(--graph-source)')
      .attr('font-size', '10px').attr('font-family', 'Inter, sans-serif').attr('font-weight', '500');

    const tooltip = d3.select(containerRef.current).append('div').attr('class', 'graph-tooltip').style('display', 'none');

    node.on('mouseover', (event, d) => {
      const connected = new Set([d.id]);
      links.forEach(l => {
        const sId = typeof l.source === 'object' ? l.source.id : l.source;
        const tId = typeof l.target === 'object' ? l.target.id : l.target;
        if (sId === d.id) connected.add(tId);
        if (tId === d.id) connected.add(sId);
      });
      node.attr('opacity', n => connected.has(n.id) ? 1 : 0.12);
      link.attr('opacity', l => {
        const sId = typeof l.source === 'object' ? l.source.id : l.source;
        const tId = typeof l.target === 'object' ? l.target.id : l.target;
        return (sId === d.id || tId === d.id) ? 0.8 : 0.03;
      });

      let tip = '';
      if (d.type === 'quote') tip = `<em>"${d.data.text.slice(0, 80)}..."</em><br><span style="color:var(--accent)">${d.data.source || ''}</span>`;
      else if (d.type === 'theme') tip = `<strong>${d.label}</strong><br>${d.count} quote${d.count !== 1 ? 's' : ''}`;
      else tip = `<strong>${d.label}</strong><br>${d.count} quote${d.count !== 1 ? 's' : ''}`;

      tooltip.html(tip).style('display', 'block')
        .style('left', (event.offsetX + 15) + 'px').style('top', (event.offsetY - 10) + 'px');
    })
    .on('mouseout', () => {
      node.attr('opacity', 1); link.attr('opacity', 0.6);
      tooltip.style('display', 'none');
    })
    .on('click', (event, d) => {
      if (d.type === 'quote' && onQuoteClick) onQuoteClick(d.data);
      else if (d.type === 'theme' && onThemeClick) onThemeClick(d.label);
      else if (d.type === 'source' && onSourceClick) onSourceClick(d.label);
    });

    sim.on('tick', () => {
      link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    return () => { sim.stop(); tooltip.remove(); };
  }, [quotes, connections]);

  if (quotes.length === 0) return <div className="empty-state">{I.graph}<h3>Your Knowledge Map</h3><p>Add quotes to see ideas connect.</p></div>;
  return (
    <div className="graph-container" ref={containerRef} style={{ position: 'relative' }}>
      <svg ref={svgRef} />
      <div className="graph-legend">
        <div className="legend-item"><div className="legend-dot" style={{ background: 'var(--graph-quote)' }} /><span>Quote</span></div>
        <div className="legend-item"><div className="legend-dot" style={{ background: 'var(--graph-theme)' }} /><span>Theme</span></div>
        <div className="legend-item"><div className="legend-dot" style={{ background: 'var(--graph-source)' }} /><span>Source</span></div>
        <div className="legend-item"><div className="legend-dot" style={{ background: 'var(--graph-connection)' }} /><span>AI Link</span></div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ─── MAIN APP ─────────────────────────────────────────────
// ═══════════════════════════════════════════════════════════
function App() {
  const [quotes, setQuotes] = useState([]);
  const [sources, setSources] = useState([]);
  const [connections, setConnections] = useState([]);
  const [apiKey, setApiKey] = useState('');
  const [view, setView] = useState('home');
  const [toast, setToast] = useState(null);
  const [toastType, setToastType] = useState('');
  const [selectedQuote, setSelectedQuote] = useState(null);
  const [editingQuote, setEditingQuote] = useState(null);
  const [selectedSource, setSelectedSource] = useState(null);
  const [browseFilter, setBrowseFilter] = useState(null);
  // Cloud sync state
  const [user, setUser] = useState(null);
  const [firebaseConfig, setFirebaseConfig] = useState(null);
  const [firebaseReady, setFirebaseReady] = useState(false);
  const [migrationOffer, setMigrationOffer] = useState(false);
  const [migrating, setMigrating] = useState(false);
  const dataLayerRef = useRef(createDataLayer(null));

  // Initialize Firebase config from IndexedDB on load
  useEffect(() => {
    dbGet('settings', 'firebaseConfig').then(cfgObj => {
      if (cfgObj?.value) {
        try {
          const cfg = typeof cfgObj.value === 'string' ? JSON.parse(cfgObj.value) : cfgObj.value;
          setFirebaseConfig(cfg);
          const ok = initFirebase(cfg);
          if (ok) {
            setFirebaseReady(true);
            // Listen for auth changes
            firebaseAuth.onAuthStateChanged(u => {
              setUser(u);
              if (u) {
                dataLayerRef.current = createDataLayer(u.uid);
              } else {
                dataLayerRef.current = createDataLayer(null);
              }
            });
          }
        } catch (e) { console.error('Bad firebase config:', e); }
      }
    }).catch(console.error);
  }, []);

  // Load data whenever user changes (switch between local/cloud)
  useEffect(() => {
    loadAllData();
  }, [user]);

  const loadAllData = async () => {
    try {
      const dl = dataLayerRef.current;
      const [q, s, c] = await Promise.all([dl.all('quotes'), dl.all('sources'), dl.all('connections')]);
      setQuotes(q); setSources(s); setConnections(c);
      // Load API key
      const keyObj = await dl.getSetting('apiKey');
      if (keyObj?.value) setApiKey(keyObj.value);
      // Auto-create sources from legacy quotes
      const existing = new Set(s.map(x => x.name.toLowerCase()));
      const newSrcs = [];
      q.forEach(quote => {
        if (quote.source && !quote.sourceId) {
          const key = quote.source.toLowerCase();
          if (!existing.has(key)) { existing.add(key); newSrcs.push({ id: genId(), name: quote.source, type: quote.sourceType || 'book', author: quote.author || '', notes: '', createdAt: quote.createdAt }); }
        }
      });
      if (newSrcs.length) {
        await Promise.all(newSrcs.map(ns => dl.put('sources', ns)));
        const s2 = await dl.all('sources');
        setSources(s2);
      }
    } catch (err) { console.error('Load error:', err); }
  };

  const showToast = (msg, type) => { setToast(msg); setToastType(type || ''); };
  const refresh = async () => {
    const dl = dataLayerRef.current;
    const [q, s, c] = await Promise.all([dl.all('quotes'), dl.all('sources'), dl.all('connections')]);
    setQuotes(q); setSources(s); setConnections(c);
  };

  // Auth handlers
  const handleGoogleLogin = async () => {
    if (!firebaseReady || !firebaseAuth) { showToast('Set up Firebase config first'); return; }
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result = await firebaseAuth.signInWithPopup(provider);
      showToast(`Welcome, ${result.user.displayName}!`, 'sync');
      // Check if cloud is empty — offer migration
      const cloudQuotes = await fsAll(result.user.uid, 'quotes');
      const localQuotes = await dbAll('quotes');
      if (cloudQuotes.length === 0 && localQuotes.length > 0) {
        setMigrationOffer(true);
      }
    } catch (err) {
      console.error('Login error:', err);
      if (err.code === 'auth/popup-blocked') showToast('Pop-up blocked — allow pop-ups for this site');
      else if (err.code === 'auth/cancelled-popup-request' || err.code === 'auth/popup-closed-by-user') { /* user cancelled */ }
      else showToast('Sign-in failed: ' + err.message);
    }
  };

  const handleLogout = async () => {
    if (firebaseAuth) await firebaseAuth.signOut();
    dataLayerRef.current = createDataLayer(null);
    setUser(null);
    showToast('Signed out — using local storage');
    await loadAllData();
  };

  const handleMigrate = async () => {
    if (!user) return;
    setMigrating(true);
    try {
      const [localQ, localS, localC] = await Promise.all([dbAll('quotes'), dbAll('sources'), dbAll('connections')]);
      const localKey = await dbGet('settings', 'apiKey');
      let count = 0;
      for (const q of localQ) { await fsPut(user.uid, 'quotes', q); count++; }
      for (const s of localS) { await fsPut(user.uid, 'sources', s); }
      for (const c of localC) { await fsPut(user.uid, 'connections', c); }
      if (localKey?.value) await fsPut(user.uid, 'settings', { id: 'apiKey', key: 'apiKey', value: localKey.value });
      showToast(`Migrated ${count} quotes to cloud!`, 'sync');
      setMigrationOffer(false);
      await refresh();
    } catch (err) { console.error('Migration error:', err); showToast('Migration failed: ' + err.message); }
    finally { setMigrating(false); }
  };

  const handleSaveFirebaseConfig = async (configJson) => {
    try {
      const cfg = typeof configJson === 'string' ? JSON.parse(configJson) : configJson;
      if (!cfg.apiKey || !cfg.projectId) throw new Error('Missing apiKey or projectId');
      await dbPut('settings', { key: 'firebaseConfig', value: cfg });
      setFirebaseConfig(cfg);
      const ok = initFirebase(cfg);
      if (ok) {
        setFirebaseReady(true);
        firebaseAuth.onAuthStateChanged(u => {
          setUser(u);
          if (u) dataLayerRef.current = createDataLayer(u.uid);
          else dataLayerRef.current = createDataLayer(null);
        });
        showToast('Firebase configured!', 'sync');
      } else {
        showToast('Firebase config invalid');
      }
    } catch (err) { showToast('Invalid config: ' + err.message); }
  };

  const handleSaveQuote = async (quote) => {
    const dl = dataLayerRef.current;
    await dl.put('quotes', quote);
    await refresh();
    showToast('Quote saved');

    if (apiKey && !quote.aiAnalyzed) {
      showToast('AI is analyzing themes...', 'ai');
      try {
        const themes = await aiExtractThemes(apiKey, quote.text, quote.source, quote.author);
        quote.aiThemes = themes;
        quote.aiAnalyzed = true;
        await dl.put('quotes', quote);

        const others = quotes.filter(q => q.id !== quote.id);
        const conns = await aiDiscoverConnections(apiKey, quote, others);
        for (const c of conns) {
          await dl.put('connections', { id: genId(), quoteA: quote.id, quoteB: c.id, reason: c.reason, createdAt: new Date().toISOString() });
        }
        await refresh();
        showToast(`AI found ${themes.length} themes and ${conns.length} connections`, 'ai');
      } catch (err) {
        console.error('AI error:', err);
        showToast('AI analysis failed — check your API key');
      }
    }
  };

  const handleDeleteQuote = async (id) => { await dataLayerRef.current.del('quotes', id); await refresh(); setSelectedQuote(null); showToast('Quote deleted'); };
  const handleSaveSource = async (source) => { await dataLayerRef.current.put('sources', source); await refresh(); showToast('Source saved'); };
  const handleDeleteSource = async (id) => { await dataLayerRef.current.del('sources', id); await refresh(); setSelectedSource(null); showToast('Source deleted'); };

  const handleSaveApiKey = async (key) => {
    setApiKey(key);
    await dataLayerRef.current.putSetting('apiKey', key);
    showToast(key ? 'API key saved' : 'API key removed');
  };

  const allThemes = useMemo(() => { const s = new Set(); quotes.forEach(q => { (q.themes || []).forEach(t => s.add(t)); (q.aiThemes || []).forEach(t => s.add(t)); }); return Array.from(s).sort(); }, [quotes]);
  const allAuthors = useMemo(() => { const s = new Set(); [...quotes, ...sources].forEach(q => { if (q.author) s.add(q.author); }); return Array.from(s).sort(); }, [quotes, sources]);

  const navTo = useCallback((v, opts) => {
    if (opts?.quote) { setSelectedQuote(opts.quote); setView('detail'); }
    else if (opts?.source) { setSelectedSource(opts.source); setView('sourceDetail'); }
    else if (opts?.filter) { setBrowseFilter(opts.filter); setView('browse'); }
    else setView(v);
  }, []);

  return (
    <div className="app-container">
      <header className="app-header">
        <div><div className="app-title">Commonplace</div><div className="app-subtitle">Your digital commonplace book</div></div>
        <div className="header-right">
          {apiKey && <span className="ai-status connected">{I.ai} AI</span>}
          {user && <span className="sync-badge">{I.cloud} Synced</span>}
          {user && user.photoURL && <img className="user-avatar" src={user.photoURL} alt="" onClick={() => setView('settings')} referrerPolicy="no-referrer" />}
        </div>
      </header>

      {migrationOffer && (
        <div style={{ padding: '0 16px' }}>
          <div className="migration-card">
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>{I.cloud}<strong style={{ fontSize: 13 }}>Upload local data to cloud?</strong></div>
            <p style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.5, marginBottom: 12 }}>You have {quotes.length} quotes stored locally. Upload them to your cloud account so they sync across all your devices?</p>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-primary btn-sm" onClick={handleMigrate} disabled={migrating}>{migrating ? 'Uploading...' : 'Upload to Cloud'}</button>
              <button className="btn btn-secondary btn-sm" onClick={() => setMigrationOffer(false)}>Skip</button>
            </div>
          </div>
        </div>
      )}

      <div className="app-content">
        {view === 'home' && <HomeView quotes={quotes} sources={sources} connections={connections} onNav={navTo} apiKey={apiKey} />}
        {view === 'add' && <AddQuoteView onSave={handleSaveQuote} onSaveSource={handleSaveSource} allThemes={allThemes} sources={sources} allAuthors={allAuthors} editingQuote={editingQuote} onCancelEdit={() => { setEditingQuote(null); setView('home'); }} apiKey={apiKey} />}
        {view === 'library' && <LibraryView sources={sources} quotes={quotes} onNav={navTo} onSaveSource={handleSaveSource} />}
        {view === 'sourceDetail' && selectedSource && <SourceDetailView source={selectedSource} quotes={quotes} onBack={() => setView('library')} onNav={navTo} onDelete={handleDeleteSource} onEdit={handleSaveSource} />}
        {view === 'browse' && <BrowseView quotes={quotes} allThemes={allThemes} onNav={navTo} initialFilter={browseFilter} />}
        {view === 'graph' && <GraphView quotes={quotes} connections={connections} sources={sources} onNav={navTo} />}
        {view === 'detail' && selectedQuote && <DetailView quote={selectedQuote} onBack={() => setView('browse')} onDelete={handleDeleteQuote} onEdit={q => { setEditingQuote(q); setView('add'); }} quotes={quotes} sources={sources} connections={connections} onNav={navTo} />}
        {view === 'settings' && <SettingsView apiKey={apiKey} onSaveApiKey={handleSaveApiKey} quotes={quotes} onRefresh={refresh} user={user} firebaseConfig={firebaseConfig} firebaseReady={firebaseReady} onLogin={handleGoogleLogin} onLogout={handleLogout} onSaveFirebaseConfig={handleSaveFirebaseConfig} dataLayer={dataLayerRef.current} />}
      </div>

      <nav className="bottom-nav">
        <button className={`nav-item ${view === 'home' ? 'active' : ''}`} onClick={() => setView('home')}>{I.home}<span>Home</span></button>
        <button className={`nav-item ${view === 'add' ? 'active' : ''}`} onClick={() => { setEditingQuote(null); setView('add'); }}>{I.plus}<span>Capture</span></button>
        <button className={`nav-item ${view === 'library' || view === 'sourceDetail' ? 'active' : ''}`} onClick={() => setView('library')}>{I.library}<span>Library</span></button>
        <button className={`nav-item ${view === 'browse' || view === 'detail' ? 'active' : ''}`} onClick={() => { setBrowseFilter(null); setView('browse'); }}>{I.search}<span>Browse</span></button>
        <button className={`nav-item ${view === 'graph' ? 'active' : ''}`} onClick={() => setView('graph')}>{I.graph}<span>Map</span></button>
        <button className={`nav-item ${view === 'settings' ? 'active' : ''}`} onClick={() => setView('settings')}>{I.settings}<span>Settings</span></button>
      </nav>

      {toast && <Toast message={toast} type={toastType} onDone={() => setToast(null)} />}
    </div>
  );
}

// ─── Home View ──────────────────────────────────────────────
function HomeView({ quotes, sources, connections, onNav, apiKey }) {
  const sorted = useMemo(() => [...quotes].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)), [quotes]);
  const themeCount = useMemo(() => { const s = new Set(); quotes.forEach(q => { (q.themes || []).forEach(t => s.add(t)); (q.aiThemes || []).forEach(t => s.add(t)); }); return s.size; }, [quotes]);

  if (quotes.length === 0) return (
    <div className="fade-in"><div className="empty-state" style={{ paddingTop: 80 }}>{I.book}<h3>Welcome to Commonplace</h3><p>Capture the words that move you. Speak them, photograph them, or type them in.{!apiKey ? ' Add your Anthropic API key in Settings to enable AI-powered theme discovery.' : ' AI is ready to discover themes and connections.'}</p><div style={{ marginTop: 20 }}><button className="btn btn-primary" onClick={() => onNav('add')}>Capture Your First Quote</button></div></div></div>
  );

  return (
    <div className="fade-in">
      <div className="stats-row">
        <div className="stat-card"><div className="stat-value">{quotes.length}</div><div className="stat-label">Quotes</div></div>
        <div className="stat-card"><div className="stat-value">{sources.length}</div><div className="stat-label">Sources</div></div>
        <div className="stat-card"><div className="stat-value">{themeCount}</div><div className="stat-label">Themes</div></div>
        <div className="stat-card"><div className="stat-value" style={{ color: 'var(--ai-accent)' }}>{connections.length}</div><div className="stat-label">AI Links</div></div>
      </div>

      <div className="section-title">Recently Captured</div>
      {sorted.slice(0, 5).map(q => <QuoteCard key={q.id} quote={q} onClick={() => onNav('detail', { quote: q })} />)}
      {quotes.length > 5 && <button className="btn btn-secondary btn-full" onClick={() => onNav('browse')}>View All {quotes.length} Quotes</button>}
    </div>
  );
}

// ─── Quote Card ─────────────────────────────────────────────
function QuoteCard({ quote, onClick }) {
  const displayText = quote.text?.length > 160 ? quote.text.slice(0, 157) + '...' : (quote.text || '');
  const allThemes = [...new Set([...(quote.themes || []), ...(quote.aiThemes || [])])];
  return (
    <div className="card card-clickable" onClick={onClick}>
      <div className="quote-text">{displayText}</div>
      <div className="quote-meta">
        {quote.source && <span className="quote-source">{quote.source}</span>}
        {quote.author && <span className="quote-author">— {quote.author}</span>}
        <span className="quote-date">{new Date(quote.date || quote.createdAt).toLocaleDateString()}</span>
        {quote.aiAnalyzed && <span className="ai-status connected" style={{ fontSize: 9 }}>{I.ai}</span>}
      </div>
      {allThemes.length > 0 && <div className="theme-tags">
        {(quote.themes || []).map(t => <span key={t} className="theme-tag">{t}</span>)}
        {(quote.aiThemes || []).filter(t => !(quote.themes || []).includes(t)).map(t => <span key={t} className="theme-tag ai-tag">{t}</span>)}
      </div>}
    </div>
  );
}

// ─── Add Quote View ─────────────────────────────────────────
function AddQuoteView({ onSave, onSaveSource, allThemes, sources, allAuthors, editingQuote, onCancelEdit, apiKey }) {
  const isEditing = !!editingQuote;
  const [text, setText] = useState(editingQuote?.text || '');
  const [sourceId, setSourceId] = useState(editingQuote?.sourceId || '');
  const [sourceName, setSourceName] = useState(editingQuote?.source || '');
  const [sourceType, setSourceType] = useState(editingQuote?.sourceType || 'book');
  const [author, setAuthor] = useState(editingQuote?.author || '');
  const [themes, setThemes] = useState(editingQuote?.themes || []);
  const [date, setDate] = useState(editingQuote?.date || new Date().toISOString().slice(0, 10));
  const [notes, setNotes] = useState(editingQuote?.notes || '');
  const [recording, setRecording] = useState(false);
  const [ocrLoading, setOcrLoading] = useState(false);
  const [showNewSource, setShowNewSource] = useState(false);
  const recognitionRef = useRef(null);
  const fileInputRef = useRef(null);

  const handleSourceSelect = (id) => {
    setSourceId(id);
    if (id) { const src = sources.find(s => s.id === id); if (src) { setSourceName(src.name); setAuthor(src.author || author); setSourceType(src.type); setShowNewSource(false); } }
    else { setSourceName(''); setShowNewSource(false); }
  };

  const toggleRecording = () => {
    if (recording) { recognitionRef.current?.stop(); setRecording(false); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition not supported. Try Chrome.'); return; }
    const r = new SR(); r.continuous = true; r.interimResults = true; r.lang = 'en-GB';
    let final = text;
    r.onresult = (e) => { let interim = ''; for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) final += (final ? ' ' : '') + e.results[i][0].transcript; else interim += e.results[i][0].transcript; } setText(final + (interim ? ' ' + interim : '')); };
    r.onend = () => setRecording(false); r.onerror = () => setRecording(false);
    recognitionRef.current = r; r.start(); setRecording(true);
  };

  const handleImageCapture = async (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setOcrLoading(true);
    try { const res = await Tesseract.recognize(file, 'eng', { logger: () => {} }); const t = res.data.text.trim(); if (t) setText(prev => (prev ? prev + '\n\n' : '') + t); else alert('No text extracted.'); }
    catch { alert('Error processing image.'); }
    finally { setOcrLoading(false); if (fileInputRef.current) fileInputRef.current.value = ''; }
  };

  const handleSubmit = async () => {
    if (!text.trim()) return;
    let fSourceId = sourceId;
    if (showNewSource && sourceName.trim()) {
      const ns = { id: genId(), name: sourceName.trim(), type: sourceType, author: author.trim(), notes: '', createdAt: new Date().toISOString() };
      await onSaveSource(ns); fSourceId = ns.id;
    }
    const quote = { id: editingQuote?.id || genId(), text: text.trim(), source: sourceName.trim(), sourceId: fSourceId, sourceType, author: author.trim(), themes: themes.filter(t => t.trim()), aiThemes: editingQuote?.aiThemes || [], aiAnalyzed: editingQuote?.aiAnalyzed || false, date, notes: notes.trim(), createdAt: editingQuote?.createdAt || new Date().toISOString(), updatedAt: new Date().toISOString() };
    try {
      await onSave(quote);
      if (!isEditing) { setText(''); setSourceId(''); setSourceName(''); setAuthor(''); setThemes([]); setNotes(''); setDate(new Date().toISOString().slice(0, 10)); setShowNewSource(false); }
    } catch (err) { console.error('Save failed:', err); alert('Save failed: ' + err.message); }
  };

  return (
    <div className="fade-in">
      <div className="section-title">{isEditing ? 'Edit Quote' : 'Capture a Quote'}</div>
      {apiKey && !isEditing && <div style={{ fontSize: 12, color: 'var(--ai-accent)', marginBottom: 12, display: 'flex', alignItems: 'center', gap: 4 }}>{I.ai} AI will auto-discover themes and connections when you save</div>}

      {!isEditing && (
        <>
          <div className="capture-methods">
            <button className={`voice-btn ${recording ? 'recording' : ''}`} onClick={toggleRecording}>{recording ? I.stop : I.mic}</button>
            <div className="capture-divider">or</div>
            <button className="camera-btn" onClick={() => fileInputRef.current?.click()}>{I.camera}</button>
            <input ref={fileInputRef} type="file" accept="image/*" capture="environment" style={{ display: 'none' }} onChange={handleImageCapture} />
          </div>
          {recording && <div style={{ textAlign: 'center', marginBottom: 12 }}><span style={{ color: 'var(--danger)', fontSize: 12, animation: 'pulse 1.5s infinite' }}>Listening...</span></div>}
          {ocrLoading && <div className="ocr-loading"><div className="spinner" /><br />Extracting text...</div>}
        </>
      )}

      <div className="form-group"><label className="form-label">Quote</label><textarea className="form-textarea" value={text} onChange={e => setText(e.target.value)} placeholder="The words you want to remember..." rows={5} /></div>

      <div className="form-group"><label className="form-label">Source</label>
        {!showNewSource ? (
          <select className="form-select" value={sourceId} onChange={e => { if (e.target.value === '__new__') { setSourceId(''); setSourceName(''); setShowNewSource(true); } else handleSourceSelect(e.target.value); }}>
            <option value="">Select a source...</option>
            {Object.keys(SRC_CFG).map(type => { const ts = sources.filter(s => s.type === type); if (!ts.length) return null; return <optgroup key={type} label={SRC_CFG[type].label}>{ts.map(s => <option key={s.id} value={s.id}>{s.name}{s.author ? ` — ${s.author}` : ''}</option>)}</optgroup>; })}
            <option value="__new__">+ Add new source...</option>
          </select>
        ) : (
          <div style={{ background: 'var(--bg-input)', border: '1px solid var(--accent)', borderRadius: 8, padding: 12 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}><span style={{ fontSize: 12, fontWeight: 600, color: 'var(--accent)' }}>New Source</span><button className="btn btn-sm btn-secondary" onClick={() => setShowNewSource(false)}>Cancel</button></div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 10 }}>
              <div><label className="form-label">Type</label><select className="form-select" value={sourceType} onChange={e => setSourceType(e.target.value)}>{Object.entries(SRC_CFG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></div>
              <div><label className="form-label">Author</label><input className="form-input" value={author} onChange={e => setAuthor(e.target.value)} placeholder="Optional" list="al" /><datalist id="al">{allAuthors.map(a => <option key={a} value={a} />)}</datalist></div>
            </div>
            <label className="form-label">Name</label><input className="form-input" value={sourceName} onChange={e => setSourceName(e.target.value)} placeholder="e.g. Meditations" autoFocus />
          </div>
        )}
      </div>

      {!showNewSource && sourceId && <div className="form-group"><label className="form-label">Author</label><input className="form-input" value={author} onChange={e => setAuthor(e.target.value)} /></div>}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        <div className="form-group"><label className="form-label">Date</label><input type="date" className="form-input" value={date} onChange={e => setDate(e.target.value)} /></div>
        {!showNewSource && !sourceId && <div className="form-group"><label className="form-label">Source Type</label><select className="form-select" value={sourceType} onChange={e => setSourceType(e.target.value)}>{Object.entries(SRC_CFG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></div>}
      </div>

      <div className="form-group"><label className="form-label">Manual Themes (optional — AI will also suggest)</label><ThemeInput themes={themes} onChange={setThemes} allThemes={allThemes} /></div>
      <div className="form-group"><label className="form-label">Personal Notes</label><textarea className="form-textarea" value={notes} onChange={e => setNotes(e.target.value)} placeholder="Why does this resonate?" rows={3} style={{ fontFamily: "'Inter', sans-serif", fontSize: 13 }} /></div>

      <div style={{ display: 'flex', gap: 10 }}>
        <button className="btn btn-primary btn-full" onClick={handleSubmit} disabled={!text.trim()}>{isEditing ? 'Update Quote' : 'Save Quote'}</button>
        {isEditing && <button className="btn btn-secondary" onClick={onCancelEdit}>Cancel</button>}
      </div>
    </div>
  );
}

// ─── Library View ───────────────────────────────────────────
function LibraryView({ sources, quotes, onNav, onSaveSource }) {
  const [search, setSearch] = useState('');
  const [filterType, setFilterType] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState(''); const [newType, setNewType] = useState('book'); const [newAuthor, setNewAuthor] = useState('');

  const qMap = useMemo(() => { const m = {}; quotes.forEach(q => { if (q.sourceId) m[q.sourceId] = (m[q.sourceId] || 0) + 1; if (q.source) { const ms = sources.find(s => s.name.toLowerCase() === q.source.toLowerCase()); if (ms && ms.id !== q.sourceId) m[ms.id] = (m[ms.id] || 0) + 1; } }); return m; }, [quotes, sources]);
  const filtered = useMemo(() => { let r = [...sources]; if (search.trim()) { const q = search.toLowerCase(); r = r.filter(s => s.name.toLowerCase().includes(q) || s.author?.toLowerCase().includes(q)); } if (filterType) r = r.filter(s => s.type === filterType); return r; }, [sources, search, filterType]);
  const grouped = useMemo(() => { const g = {}; filtered.forEach(s => { const t = s.type || 'other'; if (!g[t]) g[t] = []; g[t].push(s); }); const order = ['book','article','whitepaper','podcast','person','conversation','other']; const sorted = {}; order.forEach(t => { if (g[t]) sorted[t] = g[t].sort((a, b) => a.name.localeCompare(b.name)); }); return sorted; }, [filtered]);
  const activeTypes = useMemo(() => [...new Set(sources.map(s => s.type))], [sources]);

  const handleAdd = async () => { if (!newName.trim()) return; await onSaveSource({ id: genId(), name: newName.trim(), type: newType, author: newAuthor.trim(), notes: '', createdAt: new Date().toISOString() }); setNewName(''); setNewAuthor(''); setShowAdd(false); };

  return (
    <div className="fade-in">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}><div className="section-title" style={{ marginBottom: 0 }}>Library</div><button className="btn btn-sm btn-primary" onClick={() => setShowAdd(!showAdd)}>{showAdd ? 'Cancel' : '+ Source'}</button></div>
      {showAdd && <div className="card slide-up" style={{ marginBottom: 14, borderColor: 'var(--accent)' }}><div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 10 }}><div><label className="form-label">Type</label><select className="form-select" value={newType} onChange={e => setNewType(e.target.value)}>{Object.entries(SRC_CFG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></div><div><label className="form-label">Author</label><input className="form-input" value={newAuthor} onChange={e => setNewAuthor(e.target.value)} placeholder="Optional" /></div></div><label className="form-label">Name</label><div style={{ display: 'flex', gap: 8 }}><input className="form-input" value={newName} onChange={e => setNewName(e.target.value)} placeholder="e.g. Meditations" autoFocus /><button className="btn btn-primary btn-sm" onClick={handleAdd} disabled={!newName.trim()}>Add</button></div></div>}
      <div className="search-bar">{I.search}<input placeholder="Search sources..." value={search} onChange={e => setSearch(e.target.value)} /></div>
      <div className="filter-row"><button className={`filter-pill ${!filterType ? 'active' : ''}`} onClick={() => setFilterType(null)}>All ({sources.length})</button>{activeTypes.map(t => <button key={t} className={`filter-pill ${filterType === t ? 'active' : ''}`} onClick={() => setFilterType(filterType === t ? null : t)}>{(SRC_CFG[t]||SRC_CFG.other).label} ({sources.filter(s=>s.type===t).length})</button>)}</div>
      {Object.keys(grouped).length === 0 ? <div className="empty-state">{I.library}<h3>No sources yet</h3><p>Sources are created when you capture quotes.</p></div>
        : Object.entries(grouped).map(([type, srcs]) => { const cfg = SRC_CFG[type] || SRC_CFG.other; return (<div key={type}>{!filterType && <div className="source-group-header">{cfg.label}</div>}{srcs.map(s => <div key={s.id} className="source-card" onClick={() => onNav('sourceDetail', { source: s })}><div className="source-icon" style={{ background: cfg.color+'22', color: cfg.color }}>{cfg.icon}</div><div className="source-info"><div className="source-name">{s.name}</div><div className="source-detail">{s.author || 'Unknown author'}</div></div><div className="source-count">{qMap[s.id]||0}</div></div>)}</div>); })}
    </div>
  );
}

// ─── Source Detail View ─────────────────────────────────────

  const sThemes = useMemo(() => { const m = {}; sQuotes.forEach(q => { [...(q.themes||[]),...(q.aiThemes||[])].forEach(t => m[t]=(m[t]||0)+1); }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); }, [sQuotes]);

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}><div className="form-group"><label className="form-label">Type</label><select className="form-select" value={eT} onChange={e=>setET(e.target.value)}>{Object.entries(SRC_CFG).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div><div className="form-group"><label className="form-label">Author</label><input className="form-input" value={eA} onChange={e=>setEA(e.target.value)} /></div></div>
          <div className="form-group"><label className="form-label">Notes</label><textarea className="form-textarea" value={eNotes} onChange={e=>setENotes(e.target.value)} rows={3} style={{ fontFamily: "'Inter', sans-serif", fontSize: 13 }} /></div>
          <div style={{ display: 'flex', gap: 10 }}><button className="btn btn-primary btn-full" onClick={() => { onEdit({...source, name:eN.trim(), author:eA.trim(), type:eT, notes:eNotes.trim()}); setEditing(false); }}>Save</button><button className="btn btn-secondary" onClick={()=>setEditing(false)}>Cancel</button></div>

// ─── Browse View ────────────────────────────────────────────
function BrowseView({ quotes, allThemes, onNav, initialFilter }) {
  const [search, setSearch] = useState(initialFilter?.type==='source'?initialFilter.value:'');
  const [filterTheme, setFilterTheme] = useState(initialFilter?.type==='theme'?initialFilter.value:null);
  const [sortBy, setSortBy] = useState('newest');
  const filtered = useMemo(() => {
    let r = [...quotes];
    if (search.trim()) { const q = search.toLowerCase(); r = r.filter(x => x.text?.toLowerCase().includes(q) || x.source?.toLowerCase().includes(q) || x.author?.toLowerCase().includes(q) || x.notes?.toLowerCase().includes(q)); }
    if (filterTheme) r = r.filter(x => (x.themes||[]).includes(filterTheme) || (x.aiThemes||[]).includes(filterTheme));
    if (sortBy==='newest') r.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    else if (sortBy==='oldest') r.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
    else r.sort((a,b)=>(a.source||'').localeCompare(b.source||''));
    return r;
  }, [quotes, search, filterTheme, sortBy]);

  return (
    <div className="fade-in">
      <div className="search-bar">{I.search}<input placeholder="Search quotes, books, people..." value={search} onChange={e=>setSearch(e.target.value)} /></div>
      <div className="filter-row"><button className={`filter-pill ${!filterTheme?'active':''}`} onClick={()=>setFilterTheme(null)}>All</button>{allThemes.slice(0,6).map(t=><button key={t} className={`filter-pill ${filterTheme===t?'active':''}`} onClick={()=>setFilterTheme(filterTheme===t?null:t)}>{t}</button>)}</div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}><span style={{ fontSize: 12, color: 'var(--text-muted)' }}>{filtered.length} quote{filtered.length!==1?'s':''}</span><select className="form-select" style={{ width: 'auto', padding: '4px 8px', fontSize: 12 }} value={sortBy} onChange={e=>setSortBy(e.target.value)}><option value="newest">Newest</option><option value="oldest">Oldest</option><option value="source">Source</option></select></div>
      {filtered.length===0 ? <div className="empty-state">{I.search}<h3>No quotes found</h3><p>Try different search terms.</p></div>
        : filtered.map(q=><QuoteCard key={q.id} quote={q} onClick={()=>onNav('detail',{quote:q})} />)}
    </div>
  );
}

// ─── Detail View ────────────────────────────────────────────
function DetailView({ quote, onBack, onDelete, onEdit, quotes, sources, connections, onNav }) {
  const [confirmDel, setConfirmDel] = useState(false);
  const linkedSource = useMemo(() => { if (quote.sourceId) return sources.find(s=>s.id===quote.sourceId); if (quote.source) return sources.find(s=>s.name.toLowerCase()===quote.source.toLowerCase()); return null; }, [quote, sources]);

  const quoteConnections = useMemo(() => {
    return connections.filter(c => c.quoteA === quote.id || c.quoteB === quote.id).map(c => {
      const otherId = c.quoteA === quote.id ? c.quoteB : c.quoteA;
      const other = quotes.find(q => q.id === otherId);
      return other ? { ...c, otherQuote: other } : null;
    }).filter(Boolean);
  }, [connections, quote, quotes]);

  const related = useMemo(() => quotes.filter(q => { if (q.id === quote.id) return false; const connIds = quoteConnections.map(c=>c.otherQuote.id); if (connIds.includes(q.id)) return false; return (q.themes||[]).some(t=>(quote.themes||[]).includes(t)) || (q.aiThemes||[]).some(t=>(quote.aiThemes||[]).includes(t)); }).slice(0,3), [quotes, quote, quoteConnections]);
  const allThemes = [...new Set([...(quote.themes||[]),...(quote.aiThemes||[])])];

  return (
    <div className="fade-in">
      <button className="detail-back" onClick={onBack}>{I.chevronLeft} Back</button>
      <div className="card" style={{ marginBottom: 16 }}>
        <div className="quote-text" style={{ fontSize: 16, lineHeight: 1.8 }}>{quote.text}</div>
        <div style={{ borderTop: '1px solid var(--border)', paddingTop: 12, marginTop: 12 }}>
          <div className="quote-meta" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 6 }}>
            {quote.source && <div style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: linkedSource?'pointer':'default' }} onClick={()=>linkedSource && onNav('sourceDetail',{source:linkedSource})}>{(SRC_CFG[quote.sourceType]||SRC_CFG.other).icon}<span className="quote-source" style={{ textDecoration: linkedSource?'underline':'none' }}>{quote.source}</span><SourceTypeBadge type={quote.sourceType||'other'} /></div>}
            {quote.author && <div className="quote-author">by {quote.author}</div>}
            <div className="quote-date">{new Date(quote.date||quote.createdAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
        </div>
        {allThemes.length > 0 && <div className="theme-tags" style={{ marginTop: 12 }}>
          {(quote.themes||[]).map(t=><span key={t} className="theme-tag">{t}</span>)}
          {(quote.aiThemes||[]).filter(t=>!(quote.themes||[]).includes(t)).map(t=><span key={t} className="theme-tag ai-tag">{I.ai} {t}</span>)}
        </div>}
        {quote.notes && <div style={{ marginTop: 14, padding: 12, background: 'var(--accent-dim)', borderRadius: 8 }}><div style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>Your Notes</div><div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.6 }}>{quote.notes}</div></div>}
      </div>

      {quoteConnections.length > 0 && (
        <>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 10 }}><span style={{ color: 'var(--ai-accent)' }}>{I.ai}</span><div className="section-title" style={{ marginBottom: 0, color: 'var(--ai-accent)' }}>AI-Discovered Connections</div></div>
          {quoteConnections.map(c => (
            <div key={c.id} className="connection-card" onClick={() => onNav('detail', { quote: c.otherQuote })}>
              <div className="connection-reason">{c.reason}</div>
              <div className="connection-quote">"{c.otherQuote.text.slice(0, 120)}..."</div>
              <div className="connection-source">{c.otherQuote.source}{c.otherQuote.author ? ` — ${c.otherQuote.author}` : ''}</div>
            </div>
          ))}
        </>
      )}

      <div style={{ display: 'flex', gap: 10, marginBottom: 20 }}>
        <button className="btn btn-secondary" style={{ flex: 1 }} onClick={()=>onEdit(quote)}>{I.edit} Edit</button>
        {!confirmDel ? <button className="btn btn-danger" style={{ flex: 1 }} onClick={()=>setConfirmDel(true)}>{I.trash} Delete</button>
          : <button className="btn btn-danger" style={{ flex: 1 }} onClick={()=>onDelete(quote.id)}>Confirm?</button>}
      </div>

      {related.length > 0 && <><div className="section-title">Related by Theme</div>{related.map(q=><QuoteCard key={q.id} quote={q} onClick={()=>onNav('detail',{quote:q})} />)}</>}
    </div>
  );
}

// ─── Graph View ─────────────────────────────────────────────
function GraphView({ quotes, connections, sources, onNav }) {
  return (

      <div className="section-title">Knowledge Map</div>

// ─── SETTINGS VIEW ───────────────────────────────────────
// ═══════════════════════════════════════════════════════════
function SettingsView({ apiKey, onSaveApiKey, quotes, onRefresh, user, firebaseConfig, firebaseReady, onLogin, onLogout, onSaveFirebaseConfig, dataLayer }) {
  const [key, setKey] = useState(apiKey);
  const [showKey, setShowKey] = useState(false);
  const [analyzing, setAnalyzing] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const [configText, setConfigText] = useState(firebaseConfig ? JSON.stringify(firebaseConfig, null, 2) : '');
  const [showSetup, setShowSetup] = useState(!firebaseConfig);

  const unanalyzed = useMemo(() => quotes.filter(q => !q.aiAnalyzed), [quotes]);

  const handleBatchAnalyze = async () => {
    if (!key) { alert('Please save your API key first.'); return; }
    setAnalyzing(true); setProgress({ done: 0, total: quotes.length });
    try {
      const results = await aiBatchAnalyze(key, quotes, (done, total) => setProgress({ done, total }));
      for (const [qId, themes] of Object.entries(results.themes)) {
        const q = quotes.find(x => x.id === qId);
        if (q) { q.aiThemes = themes; q.aiAnalyzed = true; await dataLayer.put('quotes', q); }
      }
      for (const conn of results.connections) { await dataLayer.put('connections', conn); }
      await onRefresh();
      alert(`Done! Found ${Object.keys(results.themes).length} theme sets and ${results.connections.length} connections.`);
    } catch (err) { console.error(err); alert('Error during analysis: ' + err.message); }
    finally { setAnalyzing(false); }
  };

  return (
    <div className="fade-in">
      <div className="section-title">Settings</div>

      {/* ─── Cloud Sync ─── */}
      <div className="settings-section">
        <div className="settings-section-title">{I.cloud} Cloud Sync</div>

        {user ? (
          <div>
            <div className="user-bar">
              {user.photoURL && <img className="user-avatar" src={user.photoURL} alt="" referrerPolicy="no-referrer" />}
              <div className="user-bar-info">
                <div className="user-bar-name">{user.displayName || 'User'}</div>
                <div className="user-bar-email">{user.email}</div>
              </div>
              <span className="sync-badge">{I.cloud} Synced</span>
            </div>
            <button className="btn btn-secondary btn-sm" onClick={onLogout}>{I.logout} Sign Out</button>
          </div>
        ) : (
          <div>
            {firebaseReady ? (
              <div>
                <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 12, lineHeight: 1.6 }}>
                  Firebase is configured. Sign in with Google to sync your quotes across all your devices.
                </p>
                <button className="btn btn-google btn-full" onClick={onLogin}>
                  <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
                  Sign in with Google
                </button>
              </div>
            ) : (
              <div>
                <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 12, lineHeight: 1.6 }}>
                  Set up Firebase to sync your quotes across devices. Your data stays in your own Firebase project — you own it completely.
                </p>
                {showSetup && (
                  <div style={{ marginBottom: 14 }}>
                    <div className="setup-step"><span className="setup-step-num">1</span><strong style={{ fontSize: 13 }}>Go to Firebase Console</strong><p>Visit <span style={{ color: 'var(--sync-accent)' }}>console.firebase.google.com</span> and create a new project (or use an existing one).</p></div>
                    <div className="setup-step"><span className="setup-step-num">2</span><strong style={{ fontSize: 13 }}>Add a Web App</strong><p>Click the web icon (&lt;/&gt;) to add a web app. Copy the firebaseConfig object.</p></div>
                    <div className="setup-step"><span className="setup-step-num">3</span><strong style={{ fontSize: 13 }}>Enable Authentication</strong><p>Go to Authentication &rarr; Sign-in method &rarr; Enable Google sign-in.</p></div>
                    <div className="setup-step"><span className="setup-step-num">4</span><strong style={{ fontSize: 13 }}>Enable Firestore</strong><p>Go to Firestore Database &rarr; Create database &rarr; Start in test mode.</p></div>
                    <div className="setup-step"><span className="setup-step-num">5</span><strong style={{ fontSize: 13 }}>Paste Config Below</strong><p>Paste the JSON config object from step 2 into the field below and save.</p></div>
                  </div>
                )}
                {!showSetup && <button className="btn btn-sm btn-secondary" onClick={() => setShowSetup(true)} style={{ marginBottom: 12 }}>Show Setup Guide</button>}
                <div className="form-group">
                  <label className="form-label">Firebase Config (JSON)</label>
                  <textarea className="form-textarea" value={configText} onChange={e => setConfigText(e.target.value)} placeholder='{"apiKey": "...", "authDomain": "...", "projectId": "...", ...}' rows={6} style={{ fontFamily: 'monospace', fontSize: 12 }} />
                </div>
                <button className="btn btn-primary" onClick={() => onSaveFirebaseConfig(configText)} disabled={!configText.trim()}>Save Firebase Config</button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* ─── AI Config ─── */}
      <div className="settings-section">
        <div className="settings-section-title">AI Configuration</div>
        <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 12, lineHeight: 1.6 }}>
          Enter your Anthropic API key to enable automatic theme extraction and connection discovery. Your key is stored {dataLayer.isCloud ? 'in your cloud account' : 'locally on this device only'}.
        </p>
        <div className="form-group">
          <label className="form-label">API Key</label>
          <div style={{ display: 'flex', gap: 8 }}>
            <input className="form-input api-key-input" type={showKey ? 'text' : 'password'} value={key} onChange={e => setKey(e.target.value)} placeholder="sk-ant-..." style={{ flex: 1 }} />
            <button className="btn btn-sm btn-secondary" onClick={() => setShowKey(!showKey)}>{showKey ? 'Hide' : 'Show'}</button>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn btn-primary" onClick={() => onSaveApiKey(key)} disabled={key === apiKey}>Save Key</button>
          {apiKey && <button className="btn btn-danger btn-sm" onClick={() => { setKey(''); onSaveApiKey(''); }}>Remove</button>}
        </div>
        {apiKey && <div style={{ marginTop: 8 }}><span className="ai-status connected">{I.ai} Connected — using Claude Haiku</span></div>}
      </div>

      {/* ─── Batch Analysis ─── */}
      <div className="settings-section">
        <div className="settings-section-title">Batch Analysis</div>
        <p style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 12, lineHeight: 1.6 }}>
          Analyze your entire collection to discover themes and connections across all quotes. {unanalyzed.length > 0 ? `${unanalyzed.length} quote${unanalyzed.length!==1?'s':''} haven't been analyzed yet.` : 'All quotes have been analyzed.'}
        </p>
        <button className="btn btn-ai btn-full" onClick={handleBatchAnalyze} disabled={analyzing || !apiKey || quotes.length === 0}>
          {I.ai} {analyzing ? `Analyzing... ${progress.done}/${progress.total}` : `Analyze All ${quotes.length} Quotes`}
        </button>
        {analyzing && <div className="progress-bar" style={{ marginTop: 8 }}><div className="progress-bar-fill" style={{ width: `${(progress.done/progress.total)*100}%` }} /></div>}
      </div>

      {/* ─── About ─── */}
      <div className="settings-section">
        <div className="settings-section-title">About</div>
        <p style={{ fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.6 }}>
          Commonplace v4.0 — your digital commonplace book with AI-powered theme discovery and cloud sync. {dataLayer.isCloud ? 'Data synced via Firebase.' : 'Data stored locally.'} API calls go directly to Anthropic — no intermediary servers.
        </p>
      </div>
    </div>
  );
}

// ─── Render ─────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
